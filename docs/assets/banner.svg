<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="glowH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="1200" height="280" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background: #121212 -->
  <rect width="1200" height="280" rx="4" fill="#121212"/>

  <!-- Subtle grid -->
  <g clip-path="url(#rounded)" opacity="0.3">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#333333" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="280" stroke="#333333" stroke-width="0.5"/>
  </g>

  <!-- Right-side decorative: terminal-style task list -->
  <g clip-path="url(#rounded)" opacity="0.13" font-family="'Courier New', monospace" font-size="12">
    <text x="920" y="72" fill="#22c55e">$ task list --status pending</text>
    <text x="920" y="96" fill="#94a3b8">ID   TITLE                    PRI   DUE</text>
    <text x="920" y="114" fill="#333333">--------------------------------------------</text>
    <text x="920" y="132" fill="#f8fafc">a1b2  Review pull request       high  today</text>
    <text x="920" y="150" fill="#f8fafc">c3d4  Write unit tests          med   tomorrow</text>
    <text x="920" y="168" fill="#f8fafc">e5f6  Update documentation      low   --</text>
    <text x="920" y="186" fill="#94a3b8">3 pending tasks</text>
    <text x="920" y="214" fill="#22c55e">$ task done a1b2</text>
    <text x="920" y="232" fill="#94a3b8">✓ "Review pull request" marked as done</text>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="#22c55e" clip-path="url(#rounded)"/>

  <!-- Bottom glow line -->
  <rect x="150" y="275" width="900" height="1" rx="1" fill="url(#glowH)" opacity="0.6"/>

  <!-- Logo icon -->
  <g transform="translate(72, 94)">
    <rect width="92" height="92" rx="4" fill="#1f1f1f"/>
    <rect width="92" height="92" rx="4" fill="none" stroke="#333333" stroke-width="1"/>
    <!-- Checkmark / task icon -->
    <rect x="18" y="22" width="56" height="8" rx="2" fill="#22c55e" opacity="0.9" filter="url(#glow)"/>
    <rect x="18" y="38" width="40" height="8" rx="2" fill="#22c55e" opacity="0.6"/>
    <rect x="18" y="54" width="48" height="8" rx="2" fill="#22c55e" opacity="0.6"/>
    <rect x="18" y="70" width="32" height="8" rx="2" fill="#22c55e" opacity="0.3"/>
    <!-- Check indicator -->
    <rect x="70" y="38" width="8" height="8" rx="2" fill="#1f1f1f" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <rect x="70" y="54" width="8" height="8" rx="2" fill="#22c55e" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="196" y="152" font-family="'JetBrains Mono', 'Courier New', 'SF Mono', monospace" font-size="68" font-weight="700" letter-spacing="4" fill="#f8fafc" filter="url(#glow)">tasks-cli</text>

  <!-- Accent underline -->
  <rect x="198" y="162" width="380" height="2" rx="1" fill="#22c55e" opacity="0.6"/>

  <!-- Tagline -->
  <text x="198" y="190" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13.5" font-weight="400" letter-spacing="1.5" fill="#94a3b8">Offline-first task manager for the terminal - sync across devices, no account required</text>

  <!-- Bottom meta -->
  <text x="72" y="255" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#333333" letter-spacing="1">v0.1.0</text>
  <circle cx="198" cy="252" r="4" fill="#22c55e" filter="url(#glow)" opacity="0.85"/>
  <text x="210" y="256" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8" letter-spacing="1">Python 3.11+</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1199" height="279" rx="3.5" fill="none" stroke="#333333" stroke-width="1"/>
</svg>
